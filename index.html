<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>生日快乐！</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <style>
    html, body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #87CEEB;
      font-family: 'PingFang SC', 'Arial', sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* ------【弹窗互动样式】------ */
    #modal-mask {
      position: fixed;
      left:0;top:0;width:100vw;height:100vh;
      background:rgba(126,126,126,0.05);
      z-index:800;
      display:flex;align-items:center;justify-content:center;
      transition: background 0.3s;
    }
    #modal-popup {
      background:#fff;
      border-radius: 20px;
      box-shadow: 0 8px 44px #b6c2ed53;
      min-width:340px;
      width: 90vw;
      max-width:92vw;
      padding: 38px 34px 26px 34px;
      border: 1.5px solid #F1F1F7;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition:.3s cubic-bezier(.62,1,.75,1.2);
      min-height: 250px;
      max-width: 360px;
      margin: 0 auto;
    }
    @media (max-width:540px) {
      #modal-popup {
        min-width: unset;
        width: 96vw;
        max-width: 97vw;
        padding: 22px 8vw 18px 8vw;
      }
    }
    #modal-title {
      font-size: 1.45rem;
      font-weight: 700;
      color: #4a507e;
      margin-bottom: 14px;
      margin-top: 2px;
      letter-spacing: 1.2px;
      text-align: center;
    }
    #modal-msg {
      color: #5a6484;
      text-align: center;
      font-size: 1.02rem;
      margin-bottom: 22px;
      margin-top: -2px;
      letter-spacing: 0.3px;
    }
    .face-svg {
      width: 78px; height: 78px;
      display:block;
      margin: 0 auto 22px auto;
      transition: all .37s cubic-bezier(.48,2,.32,1.01);
    }
    .btn-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap:32px;
      margin-top: 22px;
      position: relative;
    }
    #modal-yes, #modal-no {
      font-size: 1.19rem;
      border:none;
      outline: none;
      border-radius: 14px;
      padding: 0.55em 2.65em;
      font-weight: 600;
      color:#fff;
      background: #5FC87C;
      box-shadow: 0 2px 13px #62e3aa1c;
      transition: background .18s, transform .12s;
      cursor: pointer;
      margin-bottom: 2px;
      position: absolute;
      bottom: 0;
      left: 0;
      opacity: 1;
      z-index: 10;
      user-select: none;
    }
    #modal-yes {
      background: #38c759;
      left: 0;
      margin-left: 0;
    }
    #modal-no {
      right: 0;
      left: auto;
      background: #e84e4f;
      color:#fff;
      transition: background .21s, transform .13s, left .3s, top .3s, right .3s;
      margin-right:0;
    }
    #modal-yes:active, #modal-no:active {
      filter: brightness(.92) saturate(1.2);
      transform: scale(.98);
    }
    /* 不想按钮随机定位用 */
    #modal-no.random {
      position: fixed!important;
      z-index: 1111;
    }

    /* ------【下方主动画样式为原UI】------ */
    #progress-container {
      position: absolute;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #87CEEB;
      z-index: 10;
    }
    #progress-bar-bg {
      width: 70vw;
      max-width: 400px;
      height: 8px;
      background: rgba(255,255,255,0.4);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 6px #fff3;
    }
    #progress-bar {
      height: 8px;
      background: #fff;
      border-radius: 6px;
      width: 0;
      transition: width 0.08s linear;
    }
    .hide { display: none!important; }
    #header {
      position: absolute;
      top: 0; left: 0; right: 0;
      width: 100vw;
      height: 120px;
      z-index: 2;
      pointer-events: none;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .balloon {
      width: 54px; height: 78px;
      position: absolute;
      top: 12px;
      z-index: 3;
      animation: balloon-float 4s infinite cubic-bezier(.6,.05,.45,.95);
    }
    .balloon.left { left: 10px; animation-delay: 0s;}
    .balloon.right { right: 10px; animation-delay: 2s;}
    @keyframes balloon-float {
      0%, 100% { transform: translateY(0);}
      50% { transform: translateY(-22px);}
    }
    #banner {
      margin: 32px auto 0;
      position: relative;
      background: linear-gradient(to right,#FFD700 40%,#FFDAD4 100%);
      border: 4px dashed #dd488a;
      border-radius: 20px 20px 18px 18px / 34px 34px 22px 22px;
      box-shadow: 0 4px 16px #fff6, 0 0 0 8px #fff3;
      padding:10px 38px;
      font-size: 2.2rem;
      color: #e74c3c;
      font-weight: bold;
      letter-spacing: 3px;
      text-shadow: 0 2px 8px #fff8, 0 0 2px #a52a2a;
      display: inline-block;
      animation: banner-boom 1.85s ease;
      border-bottom:10px solid #ffb700;
    }
    @keyframes banner-boom {
      0% { transform: scale(0.2) rotate(-32deg); opacity:0;}
      80% { transform: scale(1.22) rotate(10deg);  opacity:1;}
      100% {transform:scale(1) rotate(0);}
    }
    #particles-canvas {
      position: absolute;
      left:0;top:0;width:100vw;height:100vh;
      display:block;
      z-index: 4;
      background: transparent;
      pointer-events: none;
    }
    #countdown {
      position: absolute;
      left: 50%; top: 63%;
      transform: translate(-50%,-50%);
      color: #fff;
      font-size: 3.5rem;
      font-weight: bold;
      z-index: 31;
      opacity: 0;
      transition: opacity .25s;
      text-shadow: 0 4px 25px #5448eb77,0 0 2px #0026;
    }
    #fireworks-canvas {
      position: absolute;
      left: 0; top: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 90;
      background: transparent;
      display: none;
    }
    .wish-popup {
      position: fixed;
      z-index: 120;
      background: linear-gradient(120deg, #0c1536 67%, #282838 100%);
      border: 1.5px solid #ffffff22;
      min-width: 72px; max-width: 90vw;
      padding:9px 13px 10px 13px;
      border-radius: 12px;
      box-shadow: 0 3px 28px #4e4d6845;
      font-size: 1.05rem;
      color: #f8e3fe;
      font-weight: 500;
      left: 20vw;
      animation: popup-in .8s cubic-bezier(.44,1.4,.58,0.98);
      display: flex;
      align-items: center;
      opacity: 0.92;
      pointer-events: none;
      background-blend-mode: lighten;
      backdrop-filter: blur(2px);
    }
    @keyframes popup-in {
      0% { 
        transform: scale(.48) rotate(-12deg) translateY(140px);
        opacity: 0;
      }
      65% {
        transform: scale(1.12) rotate(5deg) translateY(-15px); 
        opacity: 1;
      }
      100% { 
        transform: scale(1) rotate(0) translateY(0);
        opacity: 1;
      }
    }
    #envelope-btn {
      position:fixed;
      right:16px;
      bottom:14px;
      z-index:180;
      width: 48px; height: 36px;
      cursor:pointer;
      opacity: .93;
      transition: transform .12s, opacity .20s;
      background:none;border:none;padding:0;
    }
    #envelope-btn:active { transform:scale(1.07); }
    #letter-modal-bg {
      position:fixed;left:0;top:0;width:100vw;height:100vh;
      background:rgba(12,10,24,0.23);
      z-index:200;display:none;
      backdrop-filter: blur(1.5px);
    }
    #letter-modal {
      position:fixed;
      left:50%;top:54%;
      transform:translate(-50%,-50%) scale(0.88);
      z-index:210;
      display:none;
      flex-direction:column;
      align-items:center;
      pointer-events: auto;
      animation: letter-in .44s cubic-bezier(.22,1.12,.68,.97);
    }
    @keyframes letter-in {
      0%{transform:translate(-50%,-54%) scale(.7);}
      55%{transform:translate(-50%,-53%) scale(1.08);}
      100%{transform:translate(-50%,-50%) scale(1);}
    }
    #letter-paper {
      width: 335px;
      max-width: 96vw;
      min-height: 200px;
      background:#fffbe7;
      border-radius:18px;
      box-shadow: 0 7px 54px #0003, 0 6px 32px #c7f9e7a0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.13rem;
      color:#AE635C;
      font-family: 'PingFang SC', 'Arial', sans-serif;
      font-weight: 600;
      padding:49px 29px 42px 29px;
      position:relative;
      text-align:center;
      border: none;
      margin-top:22px;
    }
    #letter-close {
      position:absolute;
      top:6px; right:17px;
      background:none;
      border:none;
      color:#b9b7b7;
      font-weight:bold;
      font-size:1.45rem;
      cursor:pointer;
      z-index:201;
    }
    .corner-doll {
      position: absolute;
      bottom: -33px;
      left: 14px;
      width: 70px;
      z-index:3;
      cursor: pointer;
      filter: drop-shadow(0 8px 21px #6744bc44);
      animation: dollwave 2s infinite cubic-bezier(.7,-0.24,.65,1.18);
    }
    .corner-doll:hover {
      filter: drop-shadow(0 8px 37px #f69cce77);
      transform: scale(1.05) rotate(-11deg);
    }
    @keyframes dollwave {
      0%,100%{transform:rotate(-6deg);}
      25%{transform:rotate(-11deg);}
      60%{transform:rotate(5deg);}
      85%{transform:rotate(-8deg);}
    }
    .corner-heart {
      position: absolute;
      top:10px;left: 0px;
      width: 24px;z-index:4;
      filter:blur(0.3px) drop-shadow(0 1px 3px #ff98c755);
      animation: heartb 2.5s infinite cubic-bezier(.93,.15,.27,1.3);
    }
    @keyframes heartb {
      0%,100%{transform:scale(1);}
      24%{transform:scale(1.16);}
      38%{transform:scale(0.97);}
      70%{transform:scale(1.2);}
    }
    @media (max-width: 500px) {
      #banner {font-size: 1.03rem;padding:7px 10px;}
      #letter-paper{font-size:0.98rem;}
      #countdown{font-size:2.2rem;}
      .corner-doll{width:48px;}
      #modal-popup{min-width:unset;}
    }
    body.night {
      background: #110F19 !important;
      transition:background 0.53s cubic-bezier(.67,.23,.29,.92);
    }
  </style>
</head>
<body>
  <!-- 互动弹窗 -->
  <div id="modal-mask">
    <div id="modal-popup">
      <div id="modal-title">小段~</div>
      <svg class="face-svg" id="svg-face" viewBox="0 0 100 100">
        <!-- 默认 笑脸 -->
        <circle cx="50" cy="50" r="42" fill="#FFEEDB"/>
        <ellipse cx="36" cy="46" rx="6" ry="8" fill="#565284"/>
        <ellipse cx="64" cy="46" rx="6" ry="8" fill="#565284"/>
        <!-- 眼神高光 -->
        <ellipse cx="38.3" cy="44" rx="1.4" ry="1.6" fill="#fff"/>
        <ellipse cx="61.2" cy="44" rx="1.4" ry="1.6" fill="#fff"/>
        <!-- 笑嘴 -->
        <path id="mouth-smile"
          d="M36 61 Q50 78 64 61"
          stroke="#fd987c" stroke-width="4.2" fill="none" stroke-linecap="round"/>
        <!-- 大笑嘴 -->
        <path id="mouth-laugh"
          d="M35 60 Q50 89 65 60 Q60 74 40 60"
          stroke="#fd987c" stroke-width="5" fill="none"
          stroke-linecap="round" style="opacity:0;"/>
        <!-- 沮丧嘴 -->
        <path id="mouth-sad"
          d="M36 63 Q50 49 64 63"
          stroke="#fd987c" stroke-width="4.2" fill="none" stroke-linecap="round" style="opacity:0;"/>
        <!-- 失落眼神 -->
        <ellipse id="left-sad-eye" cx="36" cy="53" rx="5.7" ry="6.3" fill="#b39daf" opacity="0"/>
        <ellipse id="right-sad-eye" cx="64" cy="53" rx="5.7" ry="6.3" fill="#b39daf" opacity="0"/>
      </svg>
      <div id="modal-msg">欢迎~</div>
      <div class="btn-row" id="modal-btn-row">
        <button id="modal-yes" type="button" style="left:0;">看看</button>
        <button id="modal-no" type="button" style="right:0;">不看</button>
      </div>
    </div>
  </div>
  <!-- 后续页面 -->
  <div id="progress-container" class="hide">
    <div id="progress-bar-bg">
      <div id="progress-bar"></div>
    </div>
  </div>
  <div id="header">
    <svg class="balloon left" viewBox="0 0 54 78">
      <ellipse cx="27" cy="38" rx="22" ry="34" fill="#ffaaff"/>
      <ellipse cx="27" cy="68" rx="6" ry="5" fill="#e57afa"/>
      <path d="M27 70 Q29 75 27 78 Q24 75 27 70" stroke="#be5aff" stroke-width="2" fill="none"/>
      <ellipse cx="24" cy="26" rx="5" ry="8" fill="#fff8" />
    </svg>
    <span id="banner">happy birthday</span>
    <svg class="balloon right" viewBox="0 0 54 78">
      <ellipse cx="27" cy="38" rx="22" ry="34" fill="#9df7ea"/>
      <ellipse cx="27" cy="68" rx="6" ry="5" fill="#33d2b8"/>
      <path d="M27 70 Q29 75 27 78 Q24 75 27 70" stroke="#19b197" stroke-width="2" fill="none"/>
      <ellipse cx="30" cy="24" rx="5" ry="7" fill="#fff7" />
    </svg>
  </div>
  <canvas id="particles-canvas"></canvas>
  <div id="countdown">3</div>
  <canvas id="fireworks-canvas"></canvas>
  <!-- 祝福弹窗 -->
  <button id="envelope-btn" aria-label="打开信纸">
    <svg viewBox="0 0 50 38" width="48" height="36">
      <rect width="50" height="38" rx="8" fill="#FFDAD4" />
      <path d="M4 8L25 28L46 8" stroke="#ED9081" stroke-width="3"/>
      <path d="M4 8L25 28L46 8V30a6 6 0 0 1-6 6H10a6 6 0 0 1-6-6V8Z" fill="#FFBBA2" />
      <ellipse cx="25" cy="16" rx="15" ry="6" fill="#FFCDB0" fill-opacity=".66" />
    </svg>
  </button>
  <div id="letter-modal-bg"></div>
  <div id="letter-modal">
    <div id="letter-paper">
      <button id="letter-close" title="关闭信纸">&times;</button>
      <svg class="corner-doll" viewBox="0 0 70 68">
        <ellipse cx="35" cy="57" rx="26" ry="9" fill="#E7D0DF"/>
        <ellipse cx="34.5" cy="35.5" rx="17.5" ry="17.5" fill="#FFD1B5"/>
        <ellipse cx="34.5" cy="23.5" rx="8.5" ry="7.5" fill="#FDCFAF"/>
        <ellipse cx="24" cy="35" rx="5" ry="4" fill="#fff"/>
        <ellipse cx="45" cy="35" rx="5" ry="4" fill="#fff"/>
        <ellipse cx="24" cy="35.5" rx="2" ry="2.1" fill="#413851"/>
        <ellipse cx="45" cy="35.5" rx="2" ry="2.1" fill="#413851"/>
        <ellipse cx="35" cy="44.4" rx="6.5" ry="2" fill="#fff"/>
        <ellipse cx="35" cy="44.4" rx="3" ry="0.8" fill="#FD9A69"/>
        <ellipse cx="35" cy="27.3" rx="2.4" ry="1" fill="#fff" fill-opacity=".28"/>
        <ellipse cx="54" cy="17" rx="6" ry="4" fill="#FFE8F6" fill-opacity="0.58"/>
        <ellipse cx="15" cy="20" rx="6" ry="4" fill="#D6F9FB"/>
      </svg>
      <svg class="corner-heart" viewBox="0 0 24 24">
        <path d="M12 21s-5.6-4.83-8-8.27C-.32 7.7 2.5 3.73 6.5 5.05A4.48 4.48 0 0 1 12 8.14a4.48 4.48 0 0 1 5.5-3.09c4-.68 6.82 3.65 2.5 7.68C17.6 16.17 12 21 12 21Z" fill="#FF81A6" stroke="#FFF" stroke-width="1.23"/>
      </svg>
      <div style="margin-top: 22px; margin-bottom:12px;line-height:2;font-size:1.22em;letter-spacing:.04em;">
        一岁一礼，一寸欢喜<br/>不管几岁，开心万岁。
      </div>
    </div>
  </div>
  <script>
    /** 互动弹窗核心 **/
    const modalMask = document.getElementById('modal-mask');
    const modalPopup = document.getElementById('modal-popup');
    const face = document.getElementById('svg-face');
    const mouthSmile = document.getElementById('mouth-smile');
    const mouthSad = document.getElementById('mouth-sad');
    const mouthLaugh = document.getElementById('mouth-laugh');
    const sadLeft = document.getElementById('left-sad-eye');
    const sadRight = document.getElementById('right-sad-eye');
    const modalYes = document.getElementById('modal-yes');
    const modalNo = document.getElementById('modal-no');
    let isSad = false, isLaugh = false, noCount = 0;
    // 复位表情
    function setFace(type) {
      mouthSmile.style.opacity = type==='smile' ? '1' : '0';
      mouthSad.style.opacity = type==='sad' ? '1' : '0';
      mouthLaugh.style.opacity = type==='laugh' ? '1' : '0';
      sadLeft.setAttribute('opacity', type==='sad'?'1':'0');
      sadRight.setAttribute('opacity', type==='sad'?'1':'0');
      // 眼睛高光
      face.querySelectorAll('ellipse').forEach((el,i)=>{
        if(i===2||i===3) el.setAttribute('opacity', type==='sad'?0.2:1);
      });
    }
    setFace('smile');
    let modalWidth = 340, modalHeight = 290;

    modalNo.addEventListener('click', function() {
      setFace('sad');
      // 随机出现在浏览器窗口任意位置
      const ww = window.innerWidth, wh = window.innerHeight;
      const btnW = 102, btnH = 43;
      let px = Math.floor(Math.random()*(ww-btnW));
      let py = Math.floor(Math.random()*(wh-btnH));
      // 随机允许部分落在弹窗内, 但有可能全局任意
      modalNo.classList.add('random');
      modalNo.style.position = 'fixed';
      modalNo.style.left = px+'px';
      modalNo.style.top = py+'px';
      modalNo.style.right = 'auto';
      modalNo.textContent = '不想';
      noCount++;
      // 每次 "不想" 持续平滑转场
      modalNo.style.transition = 'left .35s cubic-bezier(.5,1,.28,1), top .38s, background .18s, transform .13s';
    });

    modalYes.addEventListener('click', function() {
      setFace('laugh');
      modalYes.disabled = true;
      modalNo.disabled = true;
      // 按钮active效果
      modalYes.style.transform = "scale(1.07)";
      setTimeout(() => { modalYes.style.transform=""; }, 220);
      mouthLaugh.style.opacity = 1;
      setTimeout(()=>{
        // 弹窗消失,进入进度条
        modalMask.style.opacity = '0';
        modalMask.style.pointerEvents = 'none';
        setTimeout(() => {
          modalMask.style.display = "none";
          document.getElementById('progress-container').classList.remove('hide');
          setTimeout(()=>{ startProgressBar(); }, 80);
        }, 320);
      }, 970);
    });

    // 弹窗保证modal-no永不挡住"想"按钮
    window.addEventListener('resize', ()=>{
      if(modalNo.classList.contains('random')){
        // 重新随机
        modalNo.click();
      }
    });

    // ==========主动画部分,内容同之前,烟花==========
    let started = false;
    function startProgressBar(){
      if(started) return; started = true;
      progress = 0;
      doProgressBar();
    }
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    let progress = 0;
    function doProgressBar() {
      if (progress < 100) {
        progress += Math.random() * 2.1 + 1.3;
        if (progress > 100) progress = 100;
        progressBar.style.width = progress + '%';
        setTimeout(doProgressBar, 16);
      } else {
        setTimeout(()=>{
          progressContainer.classList.add('hide');
          startParticleWordStage();
        }, 360);
      }
    }

    // 粒子文字等同旧内容...
    // 下略：粒子字动画
    const pc = document.getElementById('particles-canvas');
    let pr,pg;
    function fitParticleCanvas() {
      pc.width = window.innerWidth;
      pc.height = window.innerHeight;
      pr = pc.width;
      pg = pc.height;
    } fitParticleCanvas();
    window.addEventListener("resize", fitParticleCanvas);

    let psStage = 0;
    let particles = [];
    const wordList = [
      {word:'段万军', font: 'bold 62px "PingFang SC", "Arial"'},
      {word:'祝你', font: 'bold 38px "PingFang SC", "Arial"'},
      {word:'生日快乐~', font: 'bold 72px "PingFang SC", "Arial"'},
    ];
    function getWordPixelData(text,font) {
      const offCanvas = document.createElement('canvas');
      const ctx = offCanvas.getContext('2d');
      let scale = Math.min(pr*0.88, 760);
      offCanvas.width = scale|0;
      offCanvas.height = Math.max((scale*0.42)|0,72);
      ctx.clearRect(0,0,offCanvas.width,offCanvas.height);
      ctx.font = font;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(text,offCanvas.width/2,offCanvas.height/2);
      let points = [];
      let imgData = ctx.getImageData(0,0,offCanvas.width,offCanvas.height);
      for(let y=0; y<offCanvas.height; y+=4) {
        for(let x=0; x<offCanvas.width; x+=4) {
          let i = (y*offCanvas.width+x)*4;
          if(imgData.data[i+3]>128) {points.push([x,y]);}
        }
      }
      let ox = pr/2-offCanvas.width/2, oy = pg/2-offCanvas.height/2;
      return points.map(p=>[p[0]+ox,p[1]+oy]);
    }
    function spawnParticlesForWord(text,font,particleTotal) {
      let pts = getWordPixelData(text,font);
      pts = pts.sort(()=>Math.random()-.5);
      let num = Math.max(particleTotal||560, pts.length);
      let res = [];
      for(let i=0;i<num;i++) {
        let t = pts[i%pts.length];
        res.push({ target: t });
      }
      return res;
    }
    function makeParticle(p,tgt) {
      return {
        r: 3.1, 
        x: Math.random()*pr,
        y: Math.random()*pg,
        tx: tgt[0],
        ty: tgt[1],
        vx: 0, vy: 0,
        color: '#fff'
      };
    }
    function scatterTarget(i,n) {
      let a = (i/n) * Math.PI*2;
      let rad = Math.random()*pg*0.33 + Math.random()*pr*0.21;
      let x = pr/2 + Math.cos(a)*rad*0.8;
      let y = pg/2 + Math.sin(a)*rad*0.7;
      return [x,y];
    }
    function setParticleTargets(state) {
      if(state===0) {
        particles.forEach((p,i)=>{ 
          let xy = scatterTarget(i,particles.length); 
          p.tx = xy[0]; 
          p.ty = xy[1]; 
        });
      } else if(state===1) {
        let wordPs = spawnParticlesForWord(wordList[0].word,wordList[0].font,particles.length);
        particles.forEach((p,i)=>{
          let tgt = wordPs[i].target;
          p.tx = tgt[0]; p.ty = tgt[1];
        });
      } else if(state===2) {
        let wordPs = spawnParticlesForWord(wordList[1].word,wordList[1].font,particles.length);
        particles.forEach((p,i)=>{
          let tgt = wordPs[i].target;
          p.tx = tgt[0]; p.ty = tgt[1];
        });
      } else if(state===3) {
        let wordPs = spawnParticlesForWord(wordList[2].word,wordList[2].font,particles.length);
        particles.forEach((p,i)=>{
          let tgt = wordPs[i].target;
          p.tx = tgt[0]; p.ty = tgt[1];
        });
      }
    }
    function startParticleWordStage() {
      let total = Math.max(Math.floor(window.innerWidth/2.2*window.devicePixelRatio), 580);
      let tgts = spawnParticlesForWord(wordList[0].word, wordList[0].font, total);
      particles = [];
      for(let i=0;i<total;i++){
        particles.push(makeParticle(tgts[i],tgts[i].target));
      }
      psStage=0;
      setParticleTargets(0);
      pc.style.display='block';
      requestAnimationFrame(particleRenderLoop);
      setTimeout(()=>{psStage=1;setParticleTargets(1);},650);
      setTimeout(()=>{psStage=0;setParticleTargets(0);},1750);
      setTimeout(()=>{psStage=2;setParticleTargets(2);},2380);
      setTimeout(()=>{psStage=0;setParticleTargets(0);},3170);
      setTimeout(()=>{psStage=3;setParticleTargets(3);},3770);
      setTimeout(()=>{
        pc.style.display='none';
        showCountdownStage();
      }, 4970);
    }
    function particleRenderLoop() {
      if(pc.style.display==='none') return;
      let ctx = pc.getContext('2d');
      ctx.clearRect(0,0,pr,pg);
      ctx.save();
      for(let p of particles){
        let dx = p.tx - p.x, dy = p.ty - p.y;
        let dist = Math.sqrt(dx*dx+dy*dy);
        let spd = 0.13 + 0.29*(dist>48?1:Math.max(0.07,dist/80));
        p.vx = p.vx*0.74 + dx*spd*0.13;
        p.vy = p.vy*0.74 + dy*spd*0.13;
        p.x += p.vx;
        p.y += p.vy;
        ctx.beginPath();
        ctx.arc(p.x,p.y,2.6,0,2*Math.PI);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = 0.87;
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#fff';
        ctx.fill();
        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;
      }
      ctx.restore();
      requestAnimationFrame(particleRenderLoop);
    }

    /** 倒计时3-2-1 然后黑 夜空，放烟花 **/
    const countdownEl = document.getElementById('countdown');
    function showCountdownStage(){
      countdownEl.textContent = '3';
      countdownEl.style.opacity = 1;
      setTimeout(()=>{
        countdownEl.textContent = '2';
        setTimeout(()=>{
          countdownEl.textContent = '1';
          setTimeout(()=>{
            countdownEl.style.opacity = 0;
            document.body.classList.add('night'); // 黑色背景
            setTimeout(()=>{
              showFireworksAndWishes();
            }, 350);
          }, 940);
        },910);
      },930);
    }
    // ---------------------------烟花动画------------------------------
    const fireworkCanvas = document.getElementById('fireworks-canvas');
    let fireworks = [];
    function showFireworksAndWishes() {
      fireworkCanvas.style.display='block';
      fireworkCanvas.width = window.innerWidth;
      fireworkCanvas.height = window.innerHeight;
      fireworks = [];
      for(let i=0;i<7;i++){
        setTimeout(()=>{ spawnFirework(); }, i*410 + Math.random()*260);
      }
      requestAnimationFrame(fireworksRenderLoop);
      setTimeout(()=>{ showWishPopups(); }, 1150);
    }
    function spawnFirework() {
      let x = 60+Math.random()*(fireworkCanvas.width-120);
      let y = 80+Math.random()*(fireworkCanvas.height-260);
      let color = `hsl(${Math.random()*360},93%,79%)`;
      let pN = 28+Math.random()*29|0;
      let parts = [];
      let velocity = 7.5 + Math.random()*2.7;
      for(let i=0;i<pN;i++) {
        let a = i/pN*Math.PI*2;
        let v = velocity*(0.7 + 0.33*Math.random());
        let vx = Math.cos(a)*v * (0.86+Math.random()*0.16);
        let vy = Math.sin(a)*v * (0.82+Math.random()*0.2);
        parts.push({
          x:x,y:y, vx: vx,vy: vy, life:0,
          maxLife: 36+Math.random()*25,
          color: color
        });
      }
      fireworks.push({parts,t:0});
    }
    function fireworksRenderLoop(){
      let ctx = fireworkCanvas.getContext('2d');
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#121231f4";
      ctx.fillRect(0, 0, fireworkCanvas.width, fireworkCanvas.height);
      // 所有烟花
      for (let fw of fireworks) {
        for (let p of fw.parts) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.09;
          let fade = Math.max(0, 1 - p.life/p.maxLife);
          // 拖尾
          ctx.save();
          ctx.globalAlpha = fade*0.29;
          ctx.beginPath();
          ctx.arc(p.x-p.vx*7, p.y-p.vy*7, 7.6*fade, 0, 2*Math.PI);
          ctx.fillStyle = p.color;
          ctx.shadowBlur=16;
          ctx.shadowColor=p.color;
          ctx.fill();
          ctx.restore();
          // 本体
          ctx.save();
          ctx.globalAlpha = fade*1.12;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3.2+fade*3.3, 0, 2*Math.PI);
          ctx.fillStyle = p.color;
          ctx.shadowBlur=22;
          ctx.shadowColor=p.color;
          ctx.fill();
          ctx.restore();
          p.life++;
        }
        fw.t++;
      }
      if(Math.random()<0.048) spawnFirework();
      requestAnimationFrame(fireworksRenderLoop);
    }

    /** 祝福弹窗 **/
    const wishArr = [
      '生日快乐~🎂','梦想成真','好运常伴','越来越帅','天天开心','心想事成','万事顺遂','平安健康',
      '喜乐无忧','学业进步','事业有成','遇见美好','烦恼远离','生活甜如蜜','身体棒棒哒',
      '永远幸福','前程似锦','被爱包围','好运连连','青春常在','未来可期','路路畅达',
      '天天充满正能量','一切顺利','友情常伴','不缺钱花','财源滚滚',
      '美梦成真','笑口常开','新一年大展宏图'
    ];
    let wishTimeouts = [];
    function showWishPopups(){
      clearWishPopups();
      let n = 12 + Math.floor(Math.random()*6);
      let used = [];
      for(let i=0;i<n;i++) {
        let idx;
        do{ idx = Math.floor(Math.random()*wishArr.length);}while(used.includes(idx));
        used.push(idx);
        setTimeout(()=>{
          makeWishPopup(wishArr[idx], 0.21+i*0.07+Math.random()*0.08);
        },i*260 + Math.random()*170);
      }
    }
    function makeWishPopup(msg, alpha){
      let el = document.createElement('div');
      el.className='wish-popup';
      el.innerText = msg;
      el.style.top = (16+Math.random()*69)+'%';
      el.style.left = (7+Math.random()*68)+'%';
      el.style.opacity = alpha||0.93;
      el.style.fontSize = '1.04rem';
      document.body.appendChild(el);
      wishTimeouts.push( setTimeout(()=>{
        el.style.opacity='0.13';
        setTimeout(()=>el.remove(),440);
      },1300+Math.random()*640));
    }
    function clearWishPopups(){
      document.querySelectorAll('.wish-popup').forEach(x=>x.remove());
      wishTimeouts.forEach(x=>clearTimeout(x));
      wishTimeouts=[];
    }
    /** 信封右下角/信纸弹窗 **/
    const envBtn = document.getElementById('envelope-btn');
    const letterModalBg = document.getElementById('letter-modal-bg');
    const letterModal = document.getElementById('letter-modal');
    const letterClose = document.getElementById('letter-close');
    let dollAnimState = false;
    letterModal.querySelector('.corner-doll').addEventListener('click',function(){
      if(!dollAnimState){
        this.style.transform="scale(1.23) rotate(-20deg)";
        setTimeout(()=>{this.style.transform="";},800);
        dollAnimState = true; setTimeout(()=>{dollAnimState=false;},950);
      }
    });
    function showLetterModal(){
      letterModal.style.display='flex';
      letterModalBg.style.display='block';
      setTimeout(()=>{
        letterModal.style.transform='translate(-50%,-50%) scale(1)';
      },30);
    }
    function closeLetterModal(){
      letterModal.style.transform='translate(-50%,-50%) scale(.83)';
      setTimeout(()=>{
        letterModal.style.display='none';
        letterModalBg.style.display='none';
      },170);
    }
    envBtn.addEventListener('click', showLetterModal);
    letterModalBg.addEventListener('click', closeLetterModal);
    letterClose.addEventListener('click', closeLetterModal);
    // 启动只显示弹窗
    window.onload = function() {
      modalMask.style.opacity='1';
      document.getElementById('progress-container').classList.add('hide');
    }
  </script>
</body>
</html>
